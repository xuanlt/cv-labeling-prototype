<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVLabel — Đăng nhập</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      padding: var(--space-6);
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-10) var(--space-10);
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .login-logo__icon {
      width: 40px;
      height: 40px;
      background: var(--color-accent);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .login-logo__icon svg { color: white; width: 22px; height: 22px; }

    .login-logo__name {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-text);
    }

    .login-title {
      font-size: var(--text-xl);
      font-weight: 600;
      margin-bottom: var(--space-2);
    }

    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
    }

    .btn-gitlab {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-base);
      font-weight: 500;
      background: #FC6D26;
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
    }

    .btn-gitlab:hover { background: #e05a1a; }
    .btn-gitlab:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-gitlab svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error-box {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-danger-bg);
      border: 1px solid color-mix(in srgb, var(--color-danger) 25%, transparent);
      border-radius: var(--radius);
      margin-bottom: var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-danger);
    }

    .divider-text {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-6) 0;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .login-footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .login-footer a { color: var(--color-accent); }

    .state-demo {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .state-demo .chip { font-size: 10px; }
  </style>
</head>
<body>

<div class="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <span class="login-logo__name">CVLabel</span>
  </div>

  <!-- State demo switcher -->
  <div class="state-demo">
    <button class="chip active" onclick="setState('default')">Default</button>
    <button class="chip" onclick="setState('loading')">Loading</button>
    <button class="chip" onclick="setState('error')">Error</button>
  </div>

  <!-- Title -->
  <h1 class="login-title">Đăng nhập</h1>
  <p class="login-subtitle">Sử dụng tài khoản GitLab công ty để tiếp tục.</p>

  <!-- Error state -->
  <div class="error-box" id="errorBox" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Đăng nhập thất bại. Vui lòng thử lại hoặc liên hệ IT support.</span>
  </div>

  <!-- GitLab button -->
  <button class="btn-gitlab" id="loginBtn" onclick="handleLogin()">
    <svg viewBox="0 0 380 380" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M282.83,170.73l-.27-.69L213.57,3.66a8.33,8.33,0,0,0-13.9-3.07,8.38,8.38,0,0,0-2.17,5.02l-46.54,143.37H131.69L85.15,5.61a8.1,8.1,0,0,0-2.17-5.02A8.33,8.33,0,0,0,69.08,3.66L.44,170l-.27.69A97.27,97.27,0,0,0,32.09,291.82l.44.33.78.55,116.7,87.35,57.78,43.75,35.18,26.55a8.41,8.41,0,0,0,10.26,0l35.18-26.55,57.78-43.75,117.14-87.88.5-.38A97.38,97.38,0,0,0,282.83,170.73Z"/>
    </svg>
    <span id="loginBtnText">Đăng nhập bằng GitLab</span>
  </button>

  <div class="divider-text">hoặc dùng demo account</div>

  <!-- Demo role links -->
  <div style="display:flex;flex-direction:column;gap:var(--space-2);">
    <a href="dashboard.html?role=admin" class="btn btn-secondary" style="width:100%;justify-content:center;text-align:center;">
      Vào với vai trò Admin
    </a>
    <a href="work-overview.html?role=annotator" class="btn btn-secondary" style="width:100%;justify-content:center;text-align:center;">
      Vào với vai trò Annotator
    </a>
  </div>

</div>

<!-- Footer -->
<div class="login-footer">
  <p>CVLabel v1.0.0 · <a href="#">IT Support</a> · <a href="#">Hướng dẫn sử dụng</a></p>
</div>

<script>
  function setState(state) {
    document.querySelectorAll('.state-demo .chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');

    const btn = document.getElementById('loginBtn');
    const txt = document.getElementById('loginBtnText');
    const err = document.getElementById('errorBox');

    if (state === 'default') {
      btn.disabled = false;
      btn.classList.remove('loading');
      txt.textContent = 'Đăng nhập bằng GitLab';
      err.style.display = 'none';
    } else if (state === 'loading') {
      btn.disabled = true;
      txt.textContent = 'Đang xử lý...';
      err.style.display = 'none';
    } else if (state === 'error') {
      btn.disabled = false;
      txt.textContent = 'Đăng nhập bằng GitLab';
      err.style.display = 'flex';
    }
  }

  function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const txt = document.getElementById('loginBtnText');
    btn.disabled = true;
    txt.textContent = 'Đang xử lý...';
    setTimeout(() => {
      btn.disabled = false;
      txt.textContent = 'Đăng nhập bằng GitLab';
    }, 2000);
  }
</script>

</body>
</html>
